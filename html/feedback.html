<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đánh giá & Phản hồi – Auto Cars</title>
  <link rel="stylesheet" href="../css/feedback.css">
</head>
<body>
<div class="page-wrapper">

<nav class="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__logo">Auto<span>Cars</span></a>
    <div class="nav-links">
      <a href="index.html">Trang chủ</a>
      <a href="car.html">Hãng xe</a>
      <a href="booking.html">Đặt lịch xe</a>
      <a href="feedback.html" class="active">Đánh giá</a>
      <a href="admin.html">Admin</a>
      <a href="login.html" class="nav-btn">Đăng nhập</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Đánh giá & Phản hồi</h1>
  <p>Hàng nghìn khách hàng tin tưởng và chia sẻ trải nghiệm thực tế</p>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="content">

  <div class="write-card">
    <h3>✍️ Gửi đánh giá của bạn</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Tên của bạn</label>
        <input id="fbName" class="form-control" placeholder="VD: Nguyễn Văn A">
      </div>
      <div class="form-group">
        <label>Xếp hạng</label>
        <div class="stars-input" id="writeStars">
          <span class="star" data-v="1">★</span>
          <span class="star" data-v="2">★</span>
          <span class="star" data-v="3">★</span>
          <span class="star" data-v="4">★</span>
          <span class="star" data-v="5">★</span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Nội dung đánh giá</label>
      <textarea id="fbText" class="form-control" rows="4" placeholder="Chia sẻ trải nghiệm thực tế của bạn về dịch vụ..."></textarea>
    </div>
    <button class="btn btn-gold" onclick="submitFeedback()">Gửi đánh giá</button>
  </div>

  <div class="filter-bar">
    <select id="filterStars" class="form-control" style="max-width:160px;" onchange="renderFeedbacks()">
      <option value="">Tất cả sao</option>
      <option value="5">⭐⭐⭐⭐⭐ 5 sao</option>
      <option value="4">⭐⭐⭐⭐ 4 sao</option>
      <option value="3">⭐⭐⭐ 3 sao</option>
      <option value="2">⭐⭐ 2 sao</option>
      <option value="1">⭐ 1 sao</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="document.getElementById('filterStars').value='';renderFeedbacks()">Xoá lọc</button>
  </div>

  <div class="feedback-list" id="feedbackList"></div>
</div>

<footer>
  <div class="footer__inner">
    <div><div class="footer__brand">AutoCars</div><div style="font-size:.82rem;margin-top:6px;">© 2025 Auto Cars.</div></div>
    <div class="footer__links"><a href="#">Chính sách</a><a href="#">Điều khoản</a></div>
  </div>
</footer>
</div>
<div id="toast"></div>
<script src="../js/store.js"></script>
<script src="../js/feedback.js"></script>
</body>
</html>
