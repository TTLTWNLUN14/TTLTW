<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – Auto Cars</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
<nav class="navbar" style="position:relative;">
    <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">Auto<span>Cars</span></a>
        <div class="nav-links">
            <a href="index.html">Trang chủ</a>
            <a href="car.html">Hãng xe</a>
            <a href="booking.html">Đặt lịch xe</a>
            <a href="cart.html">Giỏ hàng</a>
        </div>
    </div>
</nav>

<div class="login-wrap">
    <div class="login-box">
        <div class="login-logo">
            <span>Auto<em>Cars</em></span>
            <div>Đặt xe du lịch dễ dàng</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tLogin"    onclick="setTab('login')">Đăng nhập</button>
            <button class="tab-btn"        id="tRegister" onclick="setTab('register')">Đăng ký</button>
        </div>
        <div class="form-panel show" id="pLogin">
            <div class="form-group"><label>Tên đăng nhập</label><input id="lUser" class="form-control" placeholder="username"></div>
            <div class="form-group"><label>Mật khẩu</label><input id="lPass" class="form-control" type="password" placeholder="••••••••"></div>
            <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="doLogin()">Đăng nhập</button>
            <div class="forgot-link">Quên mật khẩu? <span onclick="setTab('forgot')">Lấy lại ngay</span></div>
        </div>
        <div class="form-panel" id="pRegister">
            <div class="form-group"><label>Tên đăng nhập</label><input id="rUser" class="form-control" placeholder="username"></div>
            <div class="form-group"><label>Số điện thoại</label><input id="rPhone" class="form-control" placeholder="09xxxxxxxx"></div>
            <div class="form-group"><label>Email</label><input id="rEmail" class="form-control" type="email" placeholder="email@example.com"></div>
            <div class="form-row">
                <div class="form-group"><label>Mật khẩu</label><input id="rPass" class="form-control" type="password" placeholder="••••••••"></div>
                <div class="form-group"><label>Nhập lại</label><input id="rPass2" class="form-control" type="password" placeholder="••••••••"></div>
            </div>
            <button class="btn btn-gold" style="width:100%;margin-top:8px;" onclick="doRegister()">Tạo tài khoản</button>
        </div>

    </div>
</div>
<div id="toast"></div>
<script src="../js/store.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
